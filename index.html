body{

body::before{

/* 🔥 Layer grid ลึกๆ */
body::after{

  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),

}

/* ===== ANIMATION ===== */

/* ไหลทั้งฉาก */
@keyframes bgFlow{

    background-position: 0% 50%;
  }
  50%{

  }
  100%{

/* แสงลอย */

.robot-top{

@keyframes floatRobot{

<script>

const EXPIRE_DATE = new Date('2026-04-29T23:59:59');

(function checkExpire(){
  const now = new Date();
  if(now > EXPIRE_DATE){
    document.body.innerHTML = `

        หมดอายุวันที่ 29 เมษายน พ.ศ. 2569
      </div>
    `;
    throw new Error("EXPIRED");
  }
})();

function login(){
 const u=document.getElementById('user').value;
 const p=document.getElementById('pass').value;
 if(u==="1234" && p==="1234"){
   document.getElementById('loginBox').style.display="none";
   document.getElementById('app').style.display="block";
 }else{
   document.getElementById('err').style.display="block";
 }
}

/* ===== SEEDED RANDOM ===== */

let baseSeed = 123456;   // ค่าเริ่มต้นหลัก
function randomAt(step, laneIndex){
  let s = baseSeed + step*100 + laneIndex*7;
  s = (s * 1664525 + 1013904223) % 4294967296;
  return s / 4294967296;
}

/* ===== END SEEDED RANDOM ===== */

const ROWS=6,COLS=30;
const history=[];
const lanes=[...Array(17)].map(()=>({items:[],pred:null}));

let metaHistory = [];   // เก็บผล / หรือ X ของ META AI
let lastMetaPick = null;
let currentAI = null;   // ← เพิ่มบรรทัดนี้ตรงนี้
let metaPickHistory = [];   // 👈 เพิ่มบรรทัดนี้ตรงนี้


/* === FORMULAS f1–f15 (ตรง Python) === */
const F=[
h=>h.at(-1),
h=>h.at(-1)==='P'?'B':'P',
h=>h.filter(x=>x==='P').length>h.filter(x=>x==='B').length?'P':'B',
h=>h.length%2===0?'P':'B',
h=>h.length>1?h.at(-1):null,
h=>h.length>1?(h.at(-1)==='P'?'B':'P'):null,
h=>randomAt(h.length,6)>.5?'P':'B',
h=>h.length<4?null:(h.slice(-4).filter(x=>x==='P').length>2?'P':'B'),
h=>h.length<6?null:(h.slice(-3).filter(x=>x==='P').length>1?'P':'B'),
h=>h.length<5?null:(h.slice(-5).filter(x=>x==='P').length>2?'B':'P'),
h=>h.length<3?null:h.at(-3),
h=>h.length<4?null:(h.at(-1)===h.at(-3)?'P':'B'),
h=>{
 if(h.length<6)return null;
 let s=1;
 for(let i=h.length-1;i>0;i--){if(h[i]===h[i-1])s++;else break}
 return s>=3?h.at(-1):(h.at(-1)==='P'?'B':'P');
},
h=>h.length<4?null:(h.at(-2)===h.at(-1)?(h.at(-1)==='P'?'B':'P'):h.at(-1)),
h=>{
 if(h.length<8)return null;
 let a=h.slice(-8);
 let d=a.filter(x=>x==='P').length-a.filter(x=>x==='B').length;
 return d>=2
   ? 'P'
   : d<=-2
     ? 'B'
     : (randomAt(h.length,14) > .5 ? 'P' : 'B');


}, 

// === f16 ===
h=>{
  if(h.length < 5) return null;

  let streakSide = h[h.length-2];
  let streak = 1;

  for(let i=h.length-3;i>=0;i--){
    if(h[i] === streakSide) streak++;
    else break;
  }

  if(streak >= 3 && h[h.length-1] !== streakSide){
    return streakSide;
  }

  return null;
},

// === f17 ===
h=>{
  if(h.length < 3) return null;

  let last3 = h.slice(-3);

  let p = last3.filter(x=>x==='P').length;
  let b = last3.filter(x=>x==='B').length;

  if(p >= 2) return 'P';
  if(b >= 2) return 'B';

  return null;
}

];

/* === DETECTORS === */
function detectDragon(){
 if(history.length<4)return null;
 let s=1;
 for(let i=history.length-1;i>0;i--){if(history[i]===history[i-1])s++;else break}
 return s>=4?history.at(-1):null;
}
function detectPingpong(){
 if(history.length<4)return false;
 let a=history.slice(-4);
 return a[0]===a[2] && a[1]===a[3] && a[0]!==a[1];
}

function detectTwoCutOne(){
  if(history.length < 6) return false;

  let h = history.slice(-6);

  // รูปแบบ เช่น P P B P P B หรือ B B P B B P
  return (
    h[0] === h[1] &&
    h[2] !== h[1] &&
    h[3] === h[4] &&
    h[5] !== h[4] &&
    h[0] === h[3] &&
    h[2] === h[5]
  );
}

/* === ACTIONS === */
function add(v){

  // 1️⃣ คำนวณ pred ก่อน
  lanes.forEach((l,i)=>{
    l.pred = F[i](history);
  });

  // 2️⃣ คำนวณ META จาก pred ชุดนี้ แล้วล็อกไว้
  currentAI = metaAI();
  lastMetaPick = currentAI && currentAI.side 
                 ? currentAI.side 
                 : null;

// 👇 เพิ่มตรงนี้เลย (ก่อน push history)
metaPickHistory.push(lastMetaPick);

  // 3️⃣ ใส่ผลจริง
  history.push(v);

  // 4️⃣ ตัดสิน lane ถูก/ผิด
  lanes.forEach(l=>{
    if(l.pred){
      l.items.push(l.pred === v ? '/' : 'X');
    }
  });

  // 5️⃣ ตัดสิน META ถูก/ผิด
  if(lastMetaPick){
    metaHistory.push(
      lastMetaPick === v ? '/' : 'X'
    );
  }

  render();
}

function undo(){

  if(history.length===0) return;

  const snapshot = history.slice(0, -1);

  // reset ทั้งหมด
  history.length = 0;
  metaHistory.length = 0;
  metaPickHistory.length = 0;

  lanes.forEach(l=>{
    l.items = [];
    l.pred = null;
  });

  lastMetaPick = null;
  currentAI = null;

  // 🔥 rebuild แบบเดียวกับ add เป๊ะ
    snapshot.forEach(v=>{

    lanes.forEach((l,i)=>{
      l.pred = F[i](history);
    });

    currentAI = metaAI();
    lastMetaPick = currentAI?.side || null;

    metaPickHistory.push(lastMetaPick);

    history.push(v);

    lanes.forEach(l=>{
      if(l.pred){
        l.items.push(l.pred === v ? '/' : 'X');
      }
    });

    if(lastMetaPick){
      metaHistory.push(lastMetaPick === v ? '/' : 'X');
    }

  });

  // 🔥 ตรงนี้คือจุดที่ต้องเพิ่ม (วางตรงนี้เลย)
  lanes.forEach((l,i)=>{
    l.pred = F[i](history);
  });
  currentAI = metaAI();

  render();
}
function clearAll(){
  history.length=0;

  lanes.forEach(l=>{
    l.items=[];
    l.pred=null;
  });

  metaHistory.length=0;
  metaPickHistory.length=0;   // 🔥 เพิ่มบรรทัดนี้

  lastMetaPick=null;
  currentAI=null;



  render();
}

function metaAI(){

  let scoreP=0;
  let scoreB=0;

  let dragon = detectDragon();
  let pingpong = detectPingpong();

  lanes.forEach((l,i)=>{
    if(!l.pred) return;

    let total=l.items.length;
    if(total<2) return; // ตัด noise เล็กน้อย

    let wins=l.items.filter(x=>x==='/').length;
    let winRate=wins/total;

    let recent=l.items.slice(-5);
 
let recentWin = recent.length
  ? recent.filter(x=>x==='/').length / recent.length
  : 0;

    // stability
    let stability = total>=10 ? 1 : total/10;

    // streak momentum
    let streak=0;
    for(let j=l.items.length-1;j>=0;j--){
      if(l.items[j]==='/') streak++;
      else break;
    }
    let momentum = Math.min(streak*0.05,0.2);

    // volatility (แกว่งไหม)
    let volatility=0;
    for(let j=1;j<l.items.length;j++){
      if(l.items[j]!==l.items[j-1])volatility++;
    }
  let reliability = Math.max(0, 1-(volatility/l.items.length));

    // random penalty
    let penalty = (i===6 || i===14)?0.8:1;

    let weight=
      winRate*0.35 +
      recentWin*0.25 +
      stability*0.15 +
      momentum +
      reliability*0.1;

    weight*=penalty;

    // 🔥 เพิ่มตรงนี้ (กัน overfit lane ใหม่)
if(i === 15 || i === 16) weight *= 0.95;

    if(dragon && l.pred!==dragon) weight*=0.7;
    if(pingpong) weight*=0.85;

    if(l.pred==='P') scoreP+=weight;
    if(l.pred==='B') scoreB+=weight;

  });

  if(scoreP===0 && scoreB===0)
    return {side:null,conf:0};

  let side = scoreP>scoreB?'P':'B';
  let conf = Math.abs(scoreP-scoreB)/(scoreP+scoreB)*100;

  return {side,conf,scoreP,scoreB};
}

function metaForce(){

  if(!metaHistory.length || !currentAI) 
    return {side:null};

  // คำนวณ META winrate
  let wins = metaHistory.filter(x=>x==='/').length;
  let total = metaHistory.length;
  let metaPct = wins/total*100;

  // ทำงานเฉพาะช่วง 48–52%
  if(metaPct < 48 || metaPct > 52)
    return {side:null};

  // 🔥 หา lane ที่ดีที่สุดจริง
  let bestLane = null;
  let bestScore = 0;

  lanes.forEach((l,i)=>{

    if(!l.pred) return;
    if(l.items.length < 5) return;        // ตัด lane ข้อมูลน้อย
    if(i===6 || i===14) return;           // ตัด random lane

    let w = l.items.filter(x=>x==='/').length;
    let pct = w/l.items.length*100;

    if(pct > bestScore){
      bestScore = pct;
      bestLane = l;
    }

  });

  if(bestLane && bestLane.pred){
    return {
      side: bestLane.pred,
      reason: `Force Best Lane (${bestScore.toFixed(1)}%)`
    };
  }

  return {side:null};
}


/* === RENDER === */
function render(){
 document.getElementById('count').textContent=
  `P=${history.filter(x=>x==='P').length} | B=${history.filter(x=>x==='B').length} | Total=${history.length}`;

 let html='';
 let best={i:0,conf:0};
 lanes.forEach((l,i)=>{
  let w=l.items.filter(x=>x==='/').length;
  let t=l.items.length||1;
  let pct=(w/t*100);
  let cls='';
  if(pct>=75)cls='gold';
  else if(pct>=60)cls='good';
  else if(pct<=35)cls='bad';
  if(pct>best.conf){best={i,conf:pct}}
  html+=`
  <div class="lane ${cls}">
    <strong>Lane ${i+1}</strong>
    <span>[${l.pred||'-'}] ${l.items.join(' ')}</span>
    <strong>${pct.toFixed(1)}%</strong>
  </div>`;
 });
 document.getElementById('lanes').innerHTML=html;

// 🔥 วางตรงนี้
let assist = metaForce();
let ab = document.getElementById('assistBox');

if(assist.side){
  let color = assist.side==='P'?'#33b5ff':'#ff6b6b';
  ab.innerHTML = `
    🔥 FORCE MODE:
    <span style="color:${color}">
      แทง ${assist.side}
    </span>
    <br>
    <span style="font-size:12px;color:#aaa">
      เหตุผล: ${assist.reason}
    </span>
  `;
}else{
  ab.innerHTML = '';
}

 document.getElementById('best').textContent=
 `Best Lane: ${best.i+1} | %${best.conf.toFixed(1)} | Predict=${lanes[best.i].pred||'-'} | Conf=${best.conf.toFixed(1)}`;

 /* ALERTS */
 let d=detectDragon();
 let p=detectPingpong();
 let twoCut = detectTwoCutOne();
 let ad=document.getElementById('alertDanger');
 let as=document.getElementById('alertSafe');
 ad.style.display=as.style.display='none';

if(twoCut){
  ad.textContent='⚠ ระวังเค้า 2 ตัด 1 ยาว ๆ';
  ad.style.display='block';
  as.style.display='none';
  document.getElementById('zone').textContent='Zone: PATTERN 2-1';
}
else if(d){
  ad.textContent=`มังกร ${d} ยาว — ระวังแทงสวน`;
  ad.style.display='block';
  as.style.display='none';
  document.getElementById('zone').textContent='Zone: DANGER';
}
else if(p){
  ad.textContent='เข้าปิงปอง — ระวังเด้ง/ตัด';
  ad.style.display='block';
  as.style.display='none';
  document.getElementById('zone').textContent='Zone: DANGER';
}
else{
  ad.style.display='none';
  as.textContent='สถานะปกติ';
  as.style.display='block';
  document.getElementById('zone').textContent='Zone: NORMAL';
}

 document.getElementById('master').textContent=
 `Master Vote: Lane ${best.i+1} | score=${best.conf.toFixed(1)}`;

let ai = currentAI;

let box = document.getElementById('aiBox');

if(!ai || !ai.side){
  box.innerHTML='WAIT — รอข้อมูลเพิ่ม';
}
else{
  let color = ai.side==='P'?'#33b5ff':'#ff6b6b';
  box.innerHTML=`
    <div class="meta-side" style="color:${color}">
  แทง: ${ai.side}
</div>
    <div>
  Confidence:
  <span class="meta-confidence">
    ${ai.conf.toFixed(1)}%
  </span>
</div>

    <div style="font-size:12px;color:#aaa">
      P Score: ${ai.scoreP.toFixed(2)} |
      B Score: ${ai.scoreB.toFixed(2)}
    </div>
  `;
}

/* ===== META PATTERN WARNING ===== */
let pw = document.getElementById('patternWarn');
pw.style.display = 'none';

if(twoCut){
  pw.innerHTML = `
    ⚠ META WARNING:
    <span style="color:#ff6b6b">
      ระวังเค้า 2 ตัด 1 ยาว ๆ
    </span>
  `;
  pw.style.display = 'block';
}

let mr = document.getElementById('metaResult');

if(metaHistory.length){

  let wins = metaHistory.filter(x=>x==='/').length;
  let total = metaHistory.length;
  let rawPct = wins/total*100;
let pct = rawPct.toFixed(1);

let adviceText = '';
let adviceColor = '#ffd24d';

if(rawPct < 50){
  adviceText = 'ตานี้ควรเล่นสวน';
  adviceColor = '#ff6b6b';
}
else if(rawPct > 50){
  adviceText = 'ตานี้ควรเล่นตาม';
  adviceColor = '#00ff88';
}
else{
  adviceText = 'กลางพอดี ผู้เล่นจะ รอจังหวะ หรือ จะเล่นตามตัวแทง Meta ai หรือ จะเล่นตาม ตัวแทงผู้ช่วย Force Mode ผู้เล่นควรตัดสินใจเองได้';
  adviceColor = '#ffd24d';
}

  let badges = metaHistory.map(r=>{
    if(r === '/'){
      return `<div class="badge win">✓</div>`;
    }else{
      return `<div class="badge lose">✕</div>`;
    }
  }).join('');

 mr.innerHTML = `
  <div class="meta-badges">
    ${badges}
  </div>

  <div class="meta-summary">
    ชนะ ${wins}/${total}
    <span class="meta-pct">
      (${pct}%)
    </span>
  </div>

 <div class="meta-advice" style="
  margin-top:6px;
  font-weight:bold;
  font-size:14px;
  color:${adviceColor};
">
  ${adviceText}
</div>
`;

}else{
  mr.innerHTML = 'ยังไม่มีผล';
}

 drawRoad();
}

function drawRoad(){
 const c=document.getElementById('road');
 const g=c.getContext('2d');
 g.clearRect(0,0,c.width,c.height);
 let x=0,y=0,last=null;
 history.forEach(v=>{
  if(v===last)y++;else{x++;y=0}
  if(y>=ROWS){y=0;x++}
  g.strokeStyle=v==='P'?'#33b5ff':'#ff0000';
  g.beginPath();
  g.arc(x*12+6,y*12+6,5,0,Math.PI*2);
  g.stroke();
  last=v;
 });
}
render();
</script>
